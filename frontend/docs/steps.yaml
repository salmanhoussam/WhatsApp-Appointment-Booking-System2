  # ══════════════════════════════════════════════════════════════════════════
  # PHASE 30: Cinematic WebGL Homepage (Z-Axis Scrolling)
  # The immersive "Beit Smar" landing — scroll drives the camera through
  # a Z-axis corridor of scenes. R3F + Drei ScrollControls + Fog.
  # ══════════════════════════════════════════════════════════════════════════

  - id: 30
    name: "Cinematic WebGL Homepage (Z-Axis Scrolling)"
    description: |
      Awwwards-level immersive homepage for the smar tenant.
      The camera moves along the negative Z-axis as the user scrolls (0→500vh).
      Each "scene" is a large plane positioned at a different Z depth, so the user
      flies through a corridor of cinematic imagery — mountain → chalets → pool → sea.
      React Three Fiber <Canvas> with Drei <ScrollControls pages={5} damping={0.15}>.
      THREE.Fog fades far planes to black; each scene materialises as the camera approaches.
    depends_on: [8]
    tasks:
      - id: 30.1
        name: "Z-Axis Scene Corridor — Architecture & Asset Placement"
        file: "src/pages/smar/showcase/SmarShowcasePage.jsx"
        status: TODO
        details: |
          Tech stack:
            - React Three Fiber (<Canvas>)
            - @react-three/drei: ScrollControls, useScroll, useTexture, Html
            - THREE.Fog(#0a0a0f, near, far) — fades distant planes to black
            - @react-three/postprocessing: Bloom + Vignette + ChromaticAberration

          Camera path (driven by useScroll().offset in useFrame):
            camera.position.z = lerp(0, -30, scrollOffset)
            camera.lookAt(0, 0, camera.position.z - 10)

          Scene layout (PlaneGeometry textured, positioned along Z):

            SCENE 1 — THE MOUNTAIN (z: 0 to z: -5)
              Background: <video> element scroll-scrubbed OR autoplay loop
              URL: https://wefjghagwpkotrrdiqyi.supabase.co/storage/v1/object/public/properties/beitsmar/homepage/Mountain%20veiw.mp4
              HTML overlay: Hero title "بيت سمار" + scroll hint
              smar_ring.png spins at z:0, shrinks to top-left by z:-5

            SCENE 2 — THE CHALETS (z: -8 to z: -14)
              PlaneGeometry (12×8) with texture:
              URL: https://wefjghagwpkotrrdiqyi.supabase.co/storage/v1/object/public/properties/beitsmar/smar-showcase/chalet-top-view.jpeg
              Glassmorphism HTML card (Drei <Html>): title + description
              Slight Y-axis tilt for depth feel

            SCENE 3 — THE POOL (z: -16 to z: -22)
              PlaneGeometry (14×9) with texture:
              URL: https://wefjghagwpkotrrdiqyi.supabase.co/storage/v1/object/public/properties/beitsmar/homepage/pool.png
              Glassmorphism HTML card: pool amenities description
              Gold particle burst around this plane

            SCENE 4 — THE FINALE / SEA VIEW (z: -24 to z: -30)
              PlaneGeometry (16×10) with texture:
              URL: https://wefjghagwpkotrrdiqyi.supabase.co/storage/v1/object/public/properties/beitsmar/homepage/beitsmar3.jpg
              Full CTA overlay: "إقامتك تنتظرك" + gold "Book Now" button
              Bloom intensity ramps up for cinematic finale glow

          Transition technique between scenes:
            - THREE.Fog makes distant scenes invisible until camera approaches
            - Each plane's material.opacity driven by distance to camera
            - Framer Motion useTransform on HTML overlays for text entrance
            - Gold particle field (3000 points) rotates slowly throughout

          Performance guardrails:
            - Canvas dpr: [1, 1.5] — no 2x on mobile
            - Textures loaded at max 1920px width
            - ChromaticAberration desktop-only (innerWidth > 1024)
            - Videos: preload="metadata", lazy buffering

