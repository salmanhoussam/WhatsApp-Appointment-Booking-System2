project: Smar 3D Scrollytelling Experience
tenant: smar
last_updated: 2026-04-11  # Phase 22 & Phase 23 are 100% DONE. System stable for Phase 19.

phases:

  - id: 1
    name: "State Management — The Bridge"
    description: "Global state layer that connects the WebGL canvas to the HTML UI without prop drilling."
    tasks:
      - id: 1.1
        name: "Create Zustand store"
        file: "src/pages/smar/store/useSmarStore.js"
        details: |
          Define global states:
            - scrollProgress (float 0→1): raw scroll position normalized
            - activeSection (string): 'hero' | 'architecture' | 'gardens' | 'pool' | 'cta'
            - isCanvasLoaded (boolean): true once R3F useProgress hits 100%
          Define actions:
            - setScrollProgress(v)
            - setActiveSection(name)
            - setCanvasLoaded()
        status: done

  - id: 2
    name: "Canvas & 3D Foundation"
    description: "Fixed WebGL layer (z-index: -1) with basic scene, lighting, and visual feedback elements."
    tasks:
      - id: 2.1
        name: "Setup base Canvas in SmarPage.jsx"
        file: "src/pages/smar/SmarPage.jsx"
        details: |
          - R3F <Canvas> with position: fixed, inset: 0, z-index: -1
          - pointer-events: none so scroll passes through
          - Wrap in <Suspense> with preloader fallback
          - Render <Scene3D /> inside the canvas
        status: done

      - id: 2.2
        name: "Create Scene3D.jsx"
        file: "src/pages/smar/canvas/Scene3D.jsx"
        details: |
          - ambientLight + pointLight (gold #d4a853)
          - <Environment preset="city" /> from Drei
          - Render <FloatingRings /> as placeholder visual
          - Render <CameraManager /> (Phase 3)
          - Post-processing: Bloom + Vignette
        status: done

      - id: 2.3
        name: "Create FloatingRings.jsx"
        file: "src/pages/smar/canvas/FloatingRings.jsx"
        details: |
          - 3 torus meshes at different scales and rotations
          - meshStandardMaterial with gold color, metalness: 1, roughness: 0.05
          - Idle rotation via useFrame
          - Scale and opacity driven by scrollProgress from useSmarStore
        status: done

  - id: 3
    name: "Scrollytelling & GSAP Integration"
    description: "Map native browser scroll to scrollProgress in Zustand, then drive the 3D camera from it."
    tasks:
      - id: 3.1
        name: "Setup GSAP ScrollTrigger"
        file: "src/pages/smar/SmarPage.jsx"
        details: |
          - gsap.registerPlugin(ScrollTrigger)
          - Create a ScrollTrigger that covers the full scroll height (e.g., 500vh)
          - On update: setScrollProgress(self.progress) into Zustand
          - Teardown on unmount (ScrollTrigger.kill())
        status: done

      - id: 3.2
        name: "Create CameraManager.jsx"
        file: "src/pages/smar/canvas/CameraManager.jsx"
        details: |
          - useFrame reads scrollProgress from useSmarStore (no re-renders)
          - Camera path: defined as a set of keyframes per section
            (e.g., hero: z=10, architecture: z=4 + x offset, pool: top-down)
          - Use THREE.MathUtils.lerp for smooth interpolation each frame
          - camera.lookAt(0, 0, 0) or a moving target point
          - Also updates activeSection based on scroll thresholds
        status: done

  - id: 4
    name: "HTML UI Overlay & Sections"
    description: "Scrollable HTML layer (z-index: 1) with section components animated by Zustand state."
    tasks:
      - id: 4.1
        name: "Build scrollable UI shell in SmarPage.jsx"
        file: "src/pages/smar/SmarPage.jsx"
        details: |
          - Outer div: position: relative, z-index: 1, pointer-events: none
          - Inner scroll container: height 500vh (matches ScrollTrigger range)
          - Fixed overlay div for section components (absolute inset-0)
          - pointer-events: auto only on interactive elements (buttons, links)
        status: done

      - id: 4.2
        name: "Create HeroSection.jsx"
        file: "src/pages/smar/sections/HeroSection.jsx"
        details: |
          - Reads scrollProgress from useSmarStore via Zustand selector
          - Framer Motion useTransform: opacity fades out 0→0.18
          - Logo image + scroll hint (matching existing ShowcaseCards HeroText style)
          - Activates when activeSection === 'hero'
        status: done

      - id: 4.3
        name: "Create ShowcaseCards.jsx"
        file: "src/pages/smar/sections/ShowcaseCards.jsx"
        details: |
          - 3 property cards (Architecture, Gardens, Pool)
          - Each reads scrollProgress from Zustand (not MotionValue context)
          - Slide-in from left/right using Framer Motion useTransform
          - GS MAR glassmorphism styling (backdrop-blur, gold border)
          - Supabase amenity images: amenity1.jpg, amenity2.jpg, amenity3.jpg
        status: done

  - id: 5
    name: "Polish & Preloading"
    description: "Loading screen driven by R3F asset progress, then graceful reveal."
    tasks:
      - id: 5.1
        name: "Implement WebGL Preloader"
        file: "src/pages/smar/ui/Preloader.jsx"
        details: |
          - Use useProgress() from @react-three/drei inside a <Canvas> child
          - Display: gold progress bar + percentage counter
          - When progress === 100: call setCanvasLoaded() in Zustand
          - SmarPage reads isCanvasLoaded → AnimatePresence exit animation
            fades the preloader out (opacity 1→0, scale 1→1.05)
          - Minimum display time: 800ms to avoid flash on fast connections
        status: done

