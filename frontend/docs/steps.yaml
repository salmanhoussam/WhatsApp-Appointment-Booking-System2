  - id: 23
    name: "Dynamic Pricing Engine — أسعار مخصصة لكل يوم + تقويم تفاعلي للادمن"
    description: |
      الادمن يسحب على التقويم لتحديد نطاق ← يضبط سعراً مخصصاً أو يحجب الأيام.
      يستخدم نموذج Price الموجود: available=false = محجوب، price = سعر مخصص.
      لا يحتاج prisma db push — الـ schema لم يتغير.
    tasks:
      - id: 23.A
        name: "Backend — calendar endpoint يُعيد disabled_dates + price_overrides"
        file: "app/api/v1/public.py"
        status: done
        details: |
          GET /{slug}/units/{unit_id}/calendar يُعيد الآن:
            { disabled_dates: [...], price_overrides: { "2026-06-15": 350.0 } }
          المصادر:
            1. Booking (status != cancelled) → disabled_dates
            2. Price (available=False) → disabled_dates
            3. Price (available=True)  → price_overrides

      - id: 23.B
        name: "Backend — date-overrides endpoint للادمن"
        file: "app/api/v1/admin/units.py"
        status: done
        details: |
          POST /admin/units/{unit_id}/date-overrides
          Body: { start_date, end_date, custom_price?, is_blocked, reason? }
          Logic: delete_many ثم create_many لسجلات Price في النطاق
          يُستخدم لكل من الحجب والتسعير المخصص

      - id: 23.C
        name: "Frontend — UnitCalendar.jsx: price chips + admin drag-to-select"
        file: "src/components/UnitCalendar.jsx"
        status: done
        details: |
          - يقبل الآن { disabled_dates, price_overrides } من الـ API
          - Backward compatible مع flat array (Phase 22)
          - price chips: سعر صغير أسفل كل خلية عندها override
          - adminMode=true: drag-to-select بـ mousedown/mouseover/mouseup
            السحب يضبط checkIn/checkOut ويُطلق onChange للـ parent
          - public mode: نفس السلوك القديم (click start/end)

      - id: 23.D
        name: "Frontend — CalendarManagerModal: drag-driven form"
        file: "src/pages/smar/admin/SmarAdminDashboard.jsx"
        status: done
        details: |
          - حذف manual date inputs — التقويم نفسه هو الـ input
          - Available / Blocked toggle
          - Custom Price input (يختفي عند Blocked)
          - "Apply" يُرسل POST /admin/units/{id}/date-overrides
          - Calendar يُعاد تحميله تلقائياً بعد النجاح (key bump)

