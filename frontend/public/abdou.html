<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى عبدو الغالي ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .love-font {
            font-family: 'Dancing Script', cursive;
        }

        .parallax-wrapper {
            perspective: 1px;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .bg-heart {
            position: fixed;
            color: rgba(255, 75, 114, 0.3);
            animation: floatUp 15s linear infinite;
            z-index: -1;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-20vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .pulse-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% {
                transform: scale(1.05);
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            }
            100% { transform: scale(1); }
        }

        .interactive-heart {
            position: fixed;
            color: #ff3366;
            font-size: 2rem;
            pointer-events: none;
            animation: popAndFade 1.5s ease-out forwards;
            z-index: 50;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
        }

        @keyframes popAndFade {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-20deg);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -100px) scale(1.2) rotate(10deg);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -150px) scale(1.5) rotate(20deg);
                opacity: 0;
            }
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            color: #d81b60;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>

<body class="text-gray-800">

    <div id="background-hearts"></div>

    <div class="parallax-wrapper" id="scroll-container">

        <section class="hero-section px-4">
            <h1 class="text-5xl md:text-7xl font-black text-pink-600 mb-6 drop-shadow-lg pulse-text">
                يا هلا بعبدو الغالي
            </h1>
            <p class="text-2xl md:text-4xl text-white font-bold mb-12 drop-shadow-md">
                في شي مهم لازم أقولك إياه...
            </p>
            <div class="scroll-indicator text-4xl">
                <i class="fas fa-chevron-down">👇</i>
            </div>
        </section>

        <section class="min-h-[80vh] flex items-center justify-center p-6 text-center">
            <div class="reveal bg-white/40 backdrop-blur-md p-8 md:p-12 rounded-3xl shadow-2xl max-w-2xl border border-white/50">
                <p class="text-2xl md:text-3xl leading-relaxed font-bold text-pink-800">
                    أنت مش بس صديق، أنت روح بتنور أيامي.<br>
                    كل لحظة معك إلها طعم خاص ومميز. ✨
                </p>
            </div>
        </section>

        <section class="min-h-[80vh] flex flex-col items-center justify-center p-6 text-center">
            <div class="reveal delay-100">
                <p class="text-3xl md:text-4xl font-bold text-white drop-shadow-md mb-8">
                    وعشان هيك، حبيت أقلك...
                </p>
            </div>
        </section>

        <section class="min-h-screen flex items-center justify-center relative overflow-hidden">
            <div class="reveal z-10 text-center">
                <h2 class="text-6xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-pink-600 drop-shadow-[0_5px_5px_rgba(0,0,0,0.3)] mb-4 love-font">
                    I Love U
                </h2>
                <h3 class="text-5xl md:text-8xl font-black text-white drop-shadow-xl pulse-text">
                    عبدو ❤️
                </h3>
            </div>
            <div class="absolute inset-0 z-0 opacity-20 pointer-events-none flex items-center justify-center">
                <div class="w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
                <div class="w-96 h-96 bg-red-400 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000 ml-20"></div>
            </div>
        </section>

        <section class="min-h-[50vh] flex flex-col items-center justify-center p-6 text-center pb-20">
            <div class="reveal bg-white/60 backdrop-blur-sm p-6 rounded-2xl shadow-xl">
                <p class="text-xl md:text-2xl font-bold text-gray-800">
                    أدامك الله لي سنداً وفرحاً. 🌹
                </p>
                <p class="text-sm mt-4 text-pink-600">
                    (استمر بالتمرير أو اضغط على الشاشة لتشوف القلوب!)
                </p>
            </div>
        </section>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bgHeartsContainer = document.getElementById('background-hearts');
            const heartSymbols = ['❤️', '💖', '💗', '💓', '💞'];

            for (let i = 0; i < 30; i++) { createBgHeart(); }

            function createBgHeart() {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = `${Math.random() * 100}vw`;
                heart.style.fontSize = `${Math.random() * 2 + 1}rem`;
                heart.style.animationDelay = `-${Math.random() * 15}s`;
                heart.style.animationDuration = `${Math.random() * 10 + 10}s`;
                bgHeartsContainer.appendChild(heart);
            }

            const scrollContainer = document.getElementById('scroll-container');
            const reveals = document.querySelectorAll('.reveal');

            function checkReveal() {
                reveals.forEach(reveal => {
                    if (reveal.getBoundingClientRect().top < window.innerHeight - 150) {
                        reveal.classList.add('active');
                    }
                });
            }

            scrollContainer.addEventListener('scroll', checkReveal);
            checkReveal();

            let lastScrollTop = 0;

            function spawnInteractiveHeart(x, y) {
                const heart = document.createElement('div');
                heart.classList.add('interactive-heart');
                heart.innerText = '❤️';
                heart.style.left = `${x}px`;
                heart.style.top = `${y}px`;
                heart.style.transform = `scale(${Math.random() * 0.5 + 0.8})`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1500);
            }

            scrollContainer.addEventListener('scroll', () => {
                const currentScrollTop = scrollContainer.scrollTop;
                if (Math.abs(currentScrollTop - lastScrollTop) > 20 && Math.random() > 0.7) {
                    spawnInteractiveHeart(Math.random() * window.innerWidth, window.innerHeight - Math.random() * 200);
                }
                lastScrollTop = currentScrollTop;
            });

            document.addEventListener('click', (e) => {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        spawnInteractiveHeart(e.clientX + (Math.random() - 0.5) * 40, e.clientY + (Math.random() - 0.5) * 40);
                    }, i * 100);
                }
            });

            document.addEventListener('touchstart', (e) => {
                spawnInteractiveHeart(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });
        });
    </script>
</body>

</html>
