<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى حمودي الغالي ❤️</title>
    <!-- استيراد خطوط Google -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            /* منع التمرير الأفقي بسبب القلوب المتطايرة */
        }

        /* تنسيق الخط الانجليزي المائل */
        .love-font {
            font-family: 'Dancing Script', cursive;
        }

        /* حاوية الصفحة للتأثيرات */
        .parallax-wrapper {
            perspective: 1px;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* قلب الخلفية العائم */
        .bg-heart {
            position: fixed;
            color: rgba(255, 75, 114, 0.3);
            animation: floatUp 15s linear infinite;
            z-index: -1;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-20vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* فئات للكشف عن العناصر عند التمرير */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* تأثير النبض للكلمة الرئيسية */
        .pulse-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            }

            100% {
                transform: scale(1);
            }
        }

        /* القلوب التي تظهر عند التمرير السريع أو النقر */
        .interactive-heart {
            position: fixed;
            color: #ff3366;
            font-size: 2rem;
            pointer-events: none;
            animation: popAndFade 1.5s ease-out forwards;
            z-index: 50;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
        }

        @keyframes popAndFade {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-20deg);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -100px) scale(1.2) rotate(10deg);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -150px) scale(1.5) rotate(20deg);
                opacity: 0;
            }
        }

        /* تنسيق القسم الرئيسي (Hero) */
        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* مؤشر التمرير للأسفل */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            animation: bounce 2s infinite;
            color: #d81b60;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }

            60% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body class="text-gray-800">

    <!-- حاوية القلوب في الخلفية سيتم ملؤها بواسطة JS -->
    <div id="background-hearts"></div>

    <div class="parallax-wrapper" id="scroll-container">

        <!-- القسم الأول: الواجهة -->
        <section class="hero-section px-4">
            <h1 class="text-5xl md:text-7xl font-black text-pink-600 mb-6 drop-shadow-lg pulse-text">
                يا هلا بحمودي الغالي
            </h1>
            <p class="text-2xl md:text-4xl text-white font-bold mb-12 drop-shadow-md">
                في شي مهم لازم أقولك إياه...
            </p>

            <div class="scroll-indicator text-4xl">
                <i class="fas fa-chevron-down">👇</i>
            </div>
        </section>

        <!-- القسم الثاني: الرسالة التمهيدية -->
        <section class="min-h-[80vh] flex items-center justify-center p-6 text-center">
            <div
                class="reveal bg-white/40 backdrop-blur-md p-8 md:p-12 rounded-3xl shadow-2xl max-w-2xl border border-white/50">
                <p class="text-2xl md:text-3xl leading-relaxed font-bold text-pink-800">
                    أنت مش بس صديق، أنت روح بتنور أيامي.<br>
                    كل لحظة معك إلها طعم خاص ومميز. ✨
                </p>
            </div>
        </section>

        <!-- القسم الثالث: كشف الرسالة الرئيسية -->
        <section class="min-h-[80vh] flex flex-col items-center justify-center p-6 text-center">
            <div class="reveal delay-100">
                <p class="text-3xl md:text-4xl font-bold text-white drop-shadow-md mb-8">
                    وعشان هيك، حبيت أقلك...
                </p>
            </div>
        </section>

        <!-- القسم الرابع: الكلمة الكبيرة -->
        <section class="min-h-screen flex items-center justify-center relative overflow-hidden">
            <div class="reveal z-10 text-center">
                <h2
                    class="text-6xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-pink-600 drop-shadow-[0_5px_5px_rgba(0,0,0,0.3)] mb-4 love-font">
                    I Love U
                </h2>
                <h3 class="text-5xl md:text-8xl font-black text-white drop-shadow-xl pulse-text">
                    حمودي ❤️
                </h3>
            </div>

            <!-- أشكال هندسية لتزيين الخلفية هنا -->
            <div class="absolute inset-0 z-0 opacity-20 pointer-events-none flex items-center justify-center">
                <div
                    class="w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob">
                </div>
                <div
                    class="w-96 h-96 bg-red-400 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000 ml-20">
                </div>
            </div>
        </section>

        <!-- القسم الأخير: الخاتمة -->
        <section class="min-h-[50vh] flex flex-col items-center justify-center p-6 text-center pb-20">
            <div class="reveal bg-white/60 backdrop-blur-sm p-6 rounded-2xl shadow-xl">
                <p class="text-xl md:text-2xl font-bold text-gray-800">
                    أدامك الله لي سنداً وفرحاً. 🌹
                </p>
                <p class="text-sm mt-4 text-pink-600">
                    (استمر بالتمرير أو اضغط على الشاشة لتشوف القلوب!)
                </p>
            </div>
        </section>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // 1. إنشاء قلوب عائمة في الخلفية
            const bgHeartsContainer = document.getElementById('background-hearts');
            const heartSymbols = ['❤️', '💖', '💗', '💓', '💞'];
            const numberOfBgHearts = 30; // عدد القلوب في الخلفية

            for (let i = 0; i < numberOfBgHearts; i++) {
                createBgHeart();
            }

            function createBgHeart() {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];

                // خصائص عشوائية لكل قلب
                const leftPos = Math.random() * 100; // موقع أفقي
                const size = Math.random() * 2 + 1; // حجم بين 1 و 3 rem
                const delay = Math.random() * 15; // تأخير البداية
                const duration = Math.random() * 10 + 10; // مدة الحركة بين 10 و 20 ثانية

                heart.style.left = `${leftPos}vw`;
                heart.style.fontSize = `${size}rem`;
                heart.style.animationDelay = `-${delay}s`; // قيمة سالبة ليبدأ فورا من أماكن مختلفة
                heart.style.animationDuration = `${duration}s`;

                bgHeartsContainer.appendChild(heart);
            }

            // 2. تأثير Scroll Reveal (ظهور العناصر عند التمرير)
            const scrollContainer = document.getElementById('scroll-container');
            const reveals = document.querySelectorAll('.reveal');

            function checkReveal() {
                const windowHeight = window.innerHeight;
                const revealPoint = 150; // النقطة التي يظهر عندها العنصر

                reveals.forEach(reveal => {
                    // حساب موقع العنصر بالنسبة للنافذة المرئية
                    const revealTop = reveal.getBoundingClientRect().top;

                    if (revealTop < windowHeight - revealPoint) {
                        reveal.classList.add('active');
                    } else {
                        // إزالة هذه الأسطر إذا أردت أن يبقى العنصر ظاهراً بعد ظهوره أول مرة
                        // reveal.classList.remove('active'); 
                    }
                });
            }

            // الاستماع لحدث التمرير على الحاوية الخاصة بنا
            scrollContainer.addEventListener('scroll', checkReveal);
            // تشغيل مرة واحدة عند التحميل للتحقق من العناصر المرئية حالياً
            checkReveal();


            // 3. تأثير القلوب المتطايرة عند التمرير السريع والنقر
            let lastScrollTop = 0;
            let scrollTimer = null;

            function spawnInteractiveHeart(x, y) {
                const heart = document.createElement('div');
                heart.classList.add('interactive-heart');
                heart.innerText = '❤️';
                heart.style.left = `${x}px`;
                heart.style.top = `${y}px`;

                // حجم عشوائي بسيط
                const scale = Math.random() * 0.5 + 0.8;
                heart.style.transform = `scale(${scale})`;

                document.body.appendChild(heart);

                // إزالة القلب بعد انتهاء الحركة (1.5 ثانية)
                setTimeout(() => {
                    heart.remove();
                }, 1500);
            }

            // إنشاء قلوب عند التمرير
            scrollContainer.addEventListener('scroll', (e) => {
                const currentScrollTop = scrollContainer.scrollTop;
                // حساب سرعة التمرير
                const scrollSpeed = Math.abs(currentScrollTop - lastScrollTop);

                // إذا كان التمرير سريعاً نوعاً ما، اصنع قلوباً عشوائية
                if (scrollSpeed > 20) {
                    // تقليل عدد القلوب المتولدة لعدم إبطاء المتصفح
                    if (Math.random() > 0.7) {
                        const randomX = Math.random() * window.innerWidth;
                        // نجعل القلب يظهر في الثلث السفلي من الشاشة لتأثير أفضل
                        const randomY = window.innerHeight - (Math.random() * 200);
                        spawnInteractiveHeart(randomX, randomY);
                    }
                }
                lastScrollTop = currentScrollTop;
            });

            // إنشاء قلوب عند النقر في أي مكان على الشاشة
            document.addEventListener('click', (e) => {
                // إنشاء 3 قلوب بمسافات عشوائية بسيطة حول مكان النقر
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const offsetX = (Math.random() - 0.5) * 40;
                        const offsetY = (Math.random() - 0.5) * 40;
                        spawnInteractiveHeart(e.clientX + offsetX, e.clientY + offsetY);
                    }, i * 100); // تأخير بسيط بين كل قلب
                }
            });

            // دعم للمس (Touch) للأجهزة المحمولة
            document.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                spawnInteractiveHeart(touch.clientX, touch.clientY);
            }, { passive: true });

        });
    </script>
</body>

</html>
