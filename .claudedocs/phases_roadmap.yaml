technical_decisions:
  slug_in_path:
    rule: "السلوغ دائماً في الـ URL path — لا يتكرر كـ query param أو request body"
    example: "GET /api/v1/public/smar/listings  ✓"
    not:     "GET /api/v1/public/listings/?client_slug=smar  ✗"
  roles:
    manager: "JWT role=manager → /admin/* كامل"
    staff:   "JWT role=staff   → /staff/* فقط"
    public:  "لا JWT            → /public/* فقط"
  db_sync:
    rule: "كل تغيير في schema.prisma يتبعه prisma db push من Railway Console"
  whatsapp:
    placeholder: "9611234567 في CollageScene — يحتاج الرقم الحقيقي قبل production"
    auto_send:   "BackgroundTask يُرسل تأكيد WhatsApp بعد كل حجز ناجح"


