            - Single pinned stage (100vh) — perspective: 1400px
            - 6 stations (position: absolute, transform-style: preserve-3d)
            - gsap.context() scoped to stageRef → ctx.revert() on unmount
            - gsap.matchMedia() — separate values for desktop / mobile
