  # ══════════════════════════════════════════════════════════════════════════
  # PHASE 17: Fix 404 API Routing Mismatch (2026-04-10)
  #
  # ROOT CAUSE:
  #   Two competing "public" route systems existed in the backend:
  #     - app/api/v1/public.py   (old, DEAD CODE — shadowed by package)
  #     - app/api/v1/public/     (new enterprise package — ACTIVE)
  #   Python imports the directory over the .py file, so all old routes
  #   (/client/{slug}/units, /client/{slug}/book) were unreachable.
  #
  #   Additionally, public/listings.py existed but was NEVER mounted
  #   in public/__init__.py, AND it imported a non-existent
  #   ListingRepository class.
  #
  # FIX SUMMARY:
  #   Backend: Mount listings router + rewrite to use existing public_service
  #   Frontend: Replace all /client/{slug}/... calls with new route pattern
  # ══════════════════════════════════════════════════════════════════════════

  - id: 17
    name: "Fix 404 API Routing Mismatch (Frontend ↔ Backend)"
    description: |
      Frontend was calling dead routes from the old public.py file which Python
      can never import because the public/ directory takes priority. The listings
      router existed but was never mounted. All frontend API calls updated to use
      the new enterprise-style query-parameter pattern.

    tasks:
      - id: 17.1
        name: "Mount listings router in backend"
        file: "app/api/v1/public/__init__.py"
        details: |
          Added 'listings' to the import and registered the router:
            from . import properties, units, bookings, listings
            router.include_router(listings.router, prefix="/listings", tags=["Public Listings"])
          This makes GET /api/v1/public/listings/?client_slug=smar available.
        status: done

      - id: 17.2
        name: "Rewrite listings.py — use existing public_service"
        file: "app/api/v1/public/listings.py"
        details: |
          Old code imported non-existent ListingRepository and ListingService.
          Rewrote to use the battle-tested public_service.get_client_catalog().
