  - id: "BUG-01"
    name: "Fix Admin Dashboard Stats 500 Error"
    status: done
    completed: 2026-04-17
    files_changed:
      - app/api/v1/admin/dashboard.py
      - app/repositories/dashboard_repo.py
    summary: |
      Root cause: checkIn (@db.Date) was queried with datetime objects instead of
      date objects, causing a Prisma type-mismatch 500 error.
      Fix:
        - get_quick_stats: changed checkIn filter to date objects (not datetime)
        - get_monthly_booking_stats: changed createdAt filter to datetime objects
          (Timestamptz column requires datetime, not date.isoformat() strings)
        - get_upcoming_checkins + get_occupancy_data: removed .replace(tzinfo=timezone.utc)
          (Date columns reject timezone-aware datetimes)
        - Wrapped get_quick_stats in try/except with logger.error

  - id: "BUG-02"
    name: "Customer CRM Linkage Failure"
    status: done
    completed: 2026-04-17
    files_changed:
      - app/services/public_service.py
      - app/schemas/booking.py
    summary: |
      Root cause: create_public_booking used db.customer.find_unique(where={"phone": ...})
      — no clientId filter. This caused a cross-tenant data leak: any customer
      matching the phone number globally would be returned, regardless of tenant.
      Fix:
        - Changed to find_first(where={"phone": ..., "clientId": client.id})
        - Customer creation now conditionally includes email if provided
        - Added customer_email: Optional[str] = None to PublicBookingRequest schema
      Verified: admin GET /bookings already had include={"customer": True, "unit": True} ✅

