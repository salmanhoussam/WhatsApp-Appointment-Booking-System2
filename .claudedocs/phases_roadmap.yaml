      - id: 31.3
        name: "Fix SmarHeader FM12+React19 crash on /spatial route"
        file: "src/pages/smar/spatial/SmarHeader.jsx:18"
        details: |
          المشكلة: نفس نمط white screen الذي أصاب SmarShowcasePage v3.
            const { scrollY } = useScroll()              ← MotionValue
            useMotionValueEvent(scrollY, 'change', ...)  ← FM subscription عبر useLayoutEffect
          React 19 StrictMode يدمر هذه الـ subscription أثناء double-mount → white screen على /spatial.
          الإصلاح (نفس نهج ShowcaseHUD v2):
            const [hidden, setHidden] = useState(false);
            const lastY = useRef(0);
            useEffect(() => {
              function onScroll() {
                const y = window.scrollY;
                setHidden(y > lastY.current && y > 80);
                lastY.current = y;
              }
              window.addEventListener('scroll', onScroll, { passive: true });
              return () => window.removeEventListener('scroll', onScroll);
            }, []);
        status: pending

