  # PHASE 22: Virtual Calendar Engine — حجب التواريخ + التقويم التفاعلي
  # يتيح للزبون رؤية التواريخ المتاحة/المحجوزة قبل الاختيار
  # ويتيح للمانجر حجب أي تواريخ يدوياً (صيانة، حجز مسبق، إلخ)
  # ══════════════════════════════════════════════════════════════════════════

  - id: 22
    name: "Virtual Calendar Engine — تقويم التوافر التفاعلي"
    description: |
      محرك تقويم متكامل: الزبون يرى التواريخ المتاحة والمحجوزة في لحظة الاختيار.
      المانجر يستطيع حجب تواريخ يدوياً (صيانة، إغلاق موسمي، إلخ).
      يُدمج في SmarBookingDrawer للزبون وفي SmarAdminDashboard للمانجر.
    depends_on: [18, 20]
    tasks:
      - id: 22.A
        name: "Backend — Calendar API: تقويم الوحدة + حجب التواريخ"
        files:
          - "prisma/schema.prisma"
          - "app/api/v1/public.py"
          - "app/api/v1/admin/units.py"
        status: done
        details: |
          1. Schema — أضف status جديد للحجوزات:
               حجب التواريخ يُخزَّن كـ Booking عادية بـ status="blocked"
               لا يحتاج model جديد — نفس جدول booking مع حقل موجود
             (لا حاجة لـ prisma db push — status عمود نصي حر)

          2. Public API — تقويم الوحدة:
               GET /api/v1/public/{slug}/units/{unit_id}/calendar
               Query params: ?year=2025&month=6  (اختياري — default: الشهر الحالي + التالي)
               يُعيد: [ { date: "2025-06-15", status: "booked" | "blocked" | "available" } ]
               فلتر في DB: bookings لهذه الوحدة بحالة confirmed|pending|blocked في النطاق الزمني
               Multi-tenancy: تحقق أن unit.clientId == client.id (من slug)

          3. Admin API — حجب تواريخ:
               POST /api/v1/admin/units/{unit_id}/block-dates
               Body: { dates: ["2025-06-20", "2025-06-21"], reason: "صيانة" }
               يُنشئ Booking واحدة بـ status="blocked", checkIn=first, checkOut=last+1
               Auth: get_current_tenant — يتحقق من ملكية الوحدة
               يُعيد: { blocked_dates: [...], booking_id: "..." }

      - id: 22.B
        name: "Frontend Component — UnitCalendar.jsx مكوّن مشترك"
        file: "src/components/UnitCalendar.jsx"
        status: done
        details: |
          مكوّن React خفيف (بدون مكتبات ثقيلة — vanilla JS Date فقط).
          Props:
            - unitId: string
            - slug: string
            - onDateSelect(checkIn, checkOut): callback
            - blockedDates: string[] (لوضع Admin)
            - readOnly: bool (default false)

          Rendering:
            - شبكة أيام الشهر (7 أعمدة × 6 صفوف)
            - اليوم المحجوز: خلفية حمراء شفافة + strikethrough
            - اليوم المحجوب (blocked): خلفية رمادية + أيقونة 🔒
            - اليوم المختار (check-in): حدود ذهبية + نقطة خضراء
            - اليوم المختار (check-out): حدود ذهبية + نقطة برتقالية
            - النطاق المختار (بين check-in وcheck-out): ظل ذهبي فاتح
            - Framer Motion: slide بين الأشهر (x: ±50px, opacity: 0→1)
            - GS MAR glassmorphism card للحاوية الخارجية

          Data fetching:
            - useEffect على [unitId, month]: GET /{slug}/units/{unitId}/calendar
            - Skeleton شبكة أيام أثناء التحميل

      - id: 22.C
        name: "Frontend Integration — دمج التقويم في الحجز والداشبورد"
        files:
          - "src/pages/smar/ui/SmarBookingDrawer.jsx"
          - "src/pages/smar/admin/SmarAdminDashboard.jsx"
        status: done
        details: |
          SmarBookingDrawer (تجربة الزبون):
            - استبدال date inputs النصية بـ <UnitCalendar> تفاعلي
            - Framer Motion AnimatePresence: التقويم يظهر عند focus على حقل التاريخ
