    name: "Bookings Tab Empty Table"
    status: done
    completed: 2026-04-17
    files_changed:
      - app/api/v1/admin/bookings.py
    summary: |
      Root cause: Backend returned a raw array [], frontend expected {data: [], total: n}.
      data.data was undefined → fallback to [] → empty table.
      Fix:
        - GET / now returns {data: [...], total: n, page: p, limit: l}
        - Added _serialize(b) helper → clean snake_case dict
        - Added _to_dt() helper for safe date→datetime conversion
        - Added PATCH /{booking_id}/status endpoint (was missing entirely)

