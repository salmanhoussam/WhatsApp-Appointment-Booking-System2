  - id: 21
    name: "نظام أدوار الموظفين (Staff Roles)"
    description: |
      صفحات منفصلة لكل دور — نفس الـ JWT لكن role مختلف.
      المانجر يرى كل شيء. الموظف يرى مهامه فقط.
      الزبون يطلب من الموقع → المهمة تظهر عند الموظف المختص.
    depends_on: [18, 19, 20]
    tasks:
      - id: 21.1
        name: "Schema — إضافة جدول StaffTask"
        file: "prisma/schema.prisma"
        status: PLANNED
        details: |
          model StaffTask {
            id         String   @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            clientId   String   @map("client_id") @db.Uuid
            type       String                         # housekeeping | cafeteria | maintenance
            unitId     String?  @map("unit_id") @db.Uuid
            bookingId  String?  @map("booking_id") @db.Uuid
            title      String                         # "تنظيف شاليه 7" / "طلب قهوة"
            notes      String?
            status     String   @default("pending")  # pending | in_progress | done
            assignedTo String?  @map("assigned_to")  # اسم الموظف أو رقمه
            createdAt  DateTime @default(now()) @map("created_at") @db.Timestamptz(6)
            updatedAt  DateTime @updatedAt @map("updated_at") @db.Timestamptz(6)
            client     Client   @relation(fields: [clientId], references: [id])
            @@map("staff_tasks")
            @@schema("public")
          }

