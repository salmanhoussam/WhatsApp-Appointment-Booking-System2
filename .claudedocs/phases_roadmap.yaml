  # ══════════════════════════════════════════════════════════════════════════
  # PHASE 30: Showcase Page (WebGL → DOM Cinematic Pivot)
  #
  # ORIGINAL PLAN: R3F Z-axis drone corridor + ParticleCorridor + shaders
  # OUTCOME: Visually disastrous on deployed build
  #   - Yellow circle in viewport center (ParticleCorridor pointsMaterial)
  #   - Flying gold squares (2500 WebGL <points> with sizeAttenuation)
  #   - GLSL soft-edge shaders produced dirty black smudges (not transparency)
  #   - White screen crash after DOM refactor (circular import bug)
  #
  # PIVOT (2026-04-15 — Phase 30.1): Scrapped ALL R3F/drei/Three.js code.
  # Rebuilt as pure DOM + Framer Motion + CSS mask-image.
  # ══════════════════════════════════════════════════════════════════════════

  - id: 30
    name: "Showcase Page — Cinematic DOM Parallax (Post-WebGL Pivot)"
    description: |
      Pure DOM-based cinematic parallax. No WebGL. No canvas. No particles.
      500vh scroll space: 100vh hero video + 2× 200vh KineticStation sections.
      CSS mask-image for soft-edge feathering (zero shader overhead).
      Framer Motion useScroll + useTransform for all animations.
    depends_on: [8]
    tasks:
      - id: 30.0
        name: "[SCRAPPED] Z-Axis WebGL Corridor — R3F + Drei + Particles"
        file: "src/pages/smar/showcase/Scene3D.jsx (DELETED)"
        status: SCRAPPED
        details: |
          Originally planned R3F approach. Failures encountered on deploy:
            - ParticleCorridor: 2500 gold <points> rendered as yellow circle + flying squares
            - SoftImageMaterial GLSL: dirty black smudges instead of soft transparency
            - Circular import: ShowcaseContext undefined in Rollup lazy chunk → white screen
          Files deleted: showcase/Scene3D.jsx, showcase/ShowcaseCards.jsx
          Root cause of white screen: ShowcaseContext imported from SmarShowcasePage
          inside ShowcaseHUD created a circular dep. Rollup lazy chunks served the
          partial (uninitialized) export → ShowcaseContext = undefined → useContext(undefined)
          throws → React unmounts tree → white screen.
          Fix: extracted ShowcaseContext to standalone ShowcaseContext.js.

      - id: 30.1
        name: "DOM Cinematic Refactor — Framer Motion + CSS Masks + Hero Video"
        file: "src/pages/smar/showcase/SmarShowcasePage.jsx"
        status: done
        details: |
          Tech stack: React + Framer Motion + CSS mask-image ONLY.
          Zero WebGL. Zero canvas. Zero R3F.

          Architecture (500vh total):
            Section 1 — HeroSection (100vh)
              Full-screen <video autoPlay muted loop playsInline> object-cover
              URL: .../homepage/Logo_Formation_Video_Ready.mp4
              Gold animated scroll hint (Framer Motion bounce)
              ShowcaseHUD (fixed, z:50) overlaid via ShowcaseContext

            Section 2 — Villa KineticStation (200vh sticky)
              Sticky inner div (top:0, height:100vh, overflow:hidden)
              BG: beitsmar7.jpg with parallax drift y: 0%→-16%
              Image: frontveiwvilla.png — enters from RIGHT (x: 92vw→0, at progress 0.85)
              Text panel — enters from LEFT (x: -80vw→0, at progress 0.55)
              CSS mask: radial-gradient(ellipse at center, black 48%, transparent 100%)
              CTA → /listings?type=villa

            Section 3 — Chalet KineticStation (200vh sticky)
              Image: beitsmar3.jpg — enters from LEFT (x: -92vw→0, at progress 0.85)
              Text panel — enters from RIGHT (x: 80vw→0, at progress 0.55)
              CTA → /listings?type=chalet

          "Organic meeting" effect:
            Text arrives at 0.55 (faster), image at 0.85 (slower).
            Text waits in center — image slowly drifts in to meet it.

          Context architecture (circular import fix):
            ShowcaseContext extracted to ShowcaseContext.js (standalone).
            SmarShowcasePage imports from ./ShowcaseContext + re-exports it.
            ShowcaseHUD imports from ./ShowcaseContext (no circular dep).

          CSS safety — inset shorthand avoided:
            top/right/bottom/left: '-18%' used explicitly on parallax bg div.
            Avoids Framer Motion / React style shorthand parsing issues.

