# PHASE 44: Admin Permissions System — Role-Based Multi-Tenant
# القرار: 2026-04-27 | الأولوية: high | قبل onboarding أي tenant جديد
# ══════════════════════════════════════════════════════════════════════════

  - id: 44
    name: "Admin Permissions — SUPER_ADMIN / TENANT_ADMIN / Staff Roles"
    status: partial  # 44.1-44.4 done (2026-04-27). 44.5 settings placeholder, 44.6 n8n pending
    priority: high
    completed_tasks:
      - "44.1: SUPER_ADMIN redirect guard in SmarAdminDashboard"
      - "44.2: TeamTab role enum fix (admin→TENANT_ADMIN, manager→MANAGER_*)"
      - "44.3: Slug fallback from getTenantSlug() on subdomain mode"
      - "44.4: TeamTab + SettingsTab placeholder cleanup"
    agent: backend-architect
    description: |
      تصحيح وبناء نظام الصلاحيات الكامل.
      المنطق الصحيح:
        - سلمان (SUPER_ADMIN)    → ClientsManager فقط — لا وصول لـ SmarAdminDashboard
        - أدمن كل tenant         → SmarAdminDashboard كاملة (TENANT_ADMIN)
        - موظفون الـ tenant       → SmarAdminDashboard مقيّدة (MANAGER_RESERVATIONS | MANAGER_UNITS)
      كل صلاحية مقيّدة بالـ slug الخاص بالـ tenant في كل query.

    permission_model:
      SUPER_ADMIN:
        who:   "سلمان فقط — User record بـ role=SUPER_ADMIN"
        where: "ClientsManager (/super/clients) فقط"
        can:   "إنشاء/تعليق/تفعيل أي tenant — لا وصول لبيانات أي tenant"

      TENANT_ADMIN:
        who:   "مالك الـ tenant (Client JWT أو User بـ role=TENANT_ADMIN)"
        where: "SmarAdminDashboard — كل الـ tabs"
        can:   "إدارة كل شيء داخل سلوغه فقط: وحدات، حجوزات، فريق، إعدادات"

      MANAGER_RESERVATIONS:
        who:   "موظف أضافه الـ TENANT_ADMIN"
        where: "SmarAdminDashboard — inbox + bookings + dashboard + housekeeping + maintenance + gardens"
        can:   "قراءة وتحديث الحجوزات — لا وحدات، لا إعدادات، لا فريق"

      MANAGER_UNITS:
        who:   "موظف أضافه الـ TENANT_ADMIN"
        where: "SmarAdminDashboard — units + services + dashboard + housekeeping + maintenance + gardens"
        can:   "إدارة الوحدات والخدمات — لا حجوزات، لا فريق، لا إعدادات"

    audit_findings_2026_04_27:
      critical:
        - file: "frontend/src/utils/useAdminRole.js"
          issue: "SUPER_ADMIN في ROLE_TABS لديه نفس tabs التنانت — يجب redirect لـ /super/clients"
          fix:   "إضافة guard في SmarAdminDashboard: if role===SUPER_ADMIN → navigate('/super/clients')"

        - file: "frontend/src/pages/smar/admin/components/TeamTab.jsx"
          issue: |
            Frontend يبعت role:'admin'|'manager' للباكند
            لكن Prisma UserRole enum: TENANT_ADMIN | MANAGER_RESERVATIONS | MANAGER_UNITS
            → mismatch كامل في الإنشاء والعرض
          fix: |
            تغيير الـ options في AddMemberModal:
              'admin'   → 'TENANT_ADMIN'
              'manager' → 'MANAGER_RESERVATIONS' أو 'MANAGER_UNITS'
            تحديث ROLE_CONFIG ليعرض الأسماء الصحيحة

      medium:
        - file: "frontend/src/pages/smar/admin/SmarAdminDashboard.jsx"
          issue: "slug undefined على subdomain mode (smar.salmansaas.com/admin) — Sidebar تعرض 'TENANT'"
          fix:   "استخدام getTenantSlug() من tenant.config.js كـ fallback عند غياب useParams().slug"

        - file: "frontend/src/pages/smar/admin/SmarAdminDashboard.jsx:TrialBanner"
          issue: "TrialBanner تقرأ من localStorage فقط — لا تعمل مع SSO direct login"
          fix:   "قراءة status من JWT payload أيضاً كـ fallback"

      low:
        - file: "frontend/src/pages/smar/admin/components/TeamTab.jsx:155"
          issue: "placeholder 'staff@beitsmar.com' hardcoded"
          fix:   "استبدال بـ placeholder غير مرتبط بـ tenant"

        - file: "frontend/src/pages/smar/admin/components/SettingsTab.jsx:148,153"
          issue: "placeholders بـ 'beitsmar' hardcoded"
          fix:   "استخدام slug ديناميكي من useParams أو getTenantSlug()"

    tasks:

      - id: 44.1
        name: "SUPER_ADMIN redirect guard في SmarAdminDashboard"
        file: "frontend/src/pages/smar/admin/SmarAdminDashboard.jsx"
        status: planned
        priority: critical
        details: |
