# PHASE 49: Catalog Display Templates — 3 طرق عرض للكاتيجوريز
# القرار: 2026-05-03 | بعد استقرار Phase 48
# ══════════════════════════════════════════════════════════════════════════

  - id: 49
    name: "Catalog Display Templates — Grid / List / Showcase"
    status: planned
    priority: high
    description: |
      كل كاتيجوري يختار صاحب العمل طريقة عرضه من 3 قوالب.
      يُخزَّن display_template على CatalogCategory (حقل جديد).
      Frontend يحمّل التمبلت المناسب تلقائياً.
      المرجع: old servers/Multy_store — نفس المنطق بـ sortOrder.

    templates:
      grid:     "شبكة 2-4 أعمدة — بطاقات زجاجية — للصالونات والخدمات العامة"
      list:     "صفوف أفقية (صورة + وصف + سعر) — للمطاعم وقوائم الأسعار"
      showcase: "بطاقات كبيرة editorial — للباقات والعروض المميزة"

    tasks:

      - id: 49.1
        name: "Schema — إضافة display_template على CatalogCategory"
        file: "prisma/schema.prisma"
        status: planned
        details: |
          إضافة حقل:
            displayTemplate  String  @default("grid") @map("display_template")
          القيم الصحيحة: "grid" | "list" | "showcase"
          Migration: ALTER TABLE catalog_categories ADD COLUMN display_template TEXT NOT NULL DEFAULT 'grid';
          ثم: npx prisma db push (DIRECT_URL port 5432)

      - id: 49.2
        name: "Backend — تحديث Schemas + Endpoints"
        file: "app/api/v1/admin/catalog.py"
        status: planned
        details: |
          CategoryCreate: إضافة display_template: str = "grid"
          CategoryUpdate: إضافة display_template: Optional[str] = None
          create_category + update_category → يخزن "displayTemplate"
          Public _fmt_category() → يرجع "display_template" في الـ response

      - id: 49.3
        name: "Frontend — 3 Template Components"
        status: planned
        details: |
          frontend/src/pages/catalog/templates/
          ├── CatalogGrid.jsx      ← repeat(auto-fill, minmax(220px, 1fr)) — GlassCard
          ├── CatalogList.jsx      ← صف أفقي: صورة 100x100 + name + desc + price (RTL)
          └── CatalogShowcase.jsx  ← بطاقات 16:9 كبيرة، 2 col desktop، وصف كامل + CTA

          كل component: يستقبل { items, accent }
          لا منطق — عرض بحت

      - id: 49.4
        name: "Frontend — Resolver في CatalogPage"
        file: "frontend/src/pages/catalog/CatalogPage.jsx"
        status: planned
        details: |
          import CatalogGrid / CatalogList / CatalogShowcase
          const TEMPLATE_MAP = { grid: CatalogGrid, list: CatalogList, showcase: CatalogShowcase }
          const TemplateComponent = TEMPLATE_MAP[activeCategory?.display_template || 'grid']
          <TemplateComponent items={items} accent={accent} />

      - id: 49.5
        name: "Admin — Template Picker UI"
        status: planned
        priority: low
        details: |
          في Admin catalog tab (عند إضافة/تعديل كاتيجوري):
          3 بطاقات clickable: Grid | List | Showcase
          كل بطاقة: اسم عربي + mini-preview SVG + وصف متى تُستخدم
          على النقر: يُحدث displayTemplate في الـ form + PATCH /admin/catalog/categories/{id}

    implementation_order:
      - "49.1 → Schema migration (10 min)"
      - "49.2 → Backend update (15 min)"
      - "49.3 → 3 template components (45 min)"
      - "49.4 → Resolver في CatalogPage (10 min)"
      - "49.5 → Admin picker (30 min — لاحقاً)"

    design_doc: ".claudedocs/design/infinite-sites-ai-scaffolding.md"

