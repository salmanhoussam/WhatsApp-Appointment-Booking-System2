# PHASE 52: Self-Service Onboarding — Plan B
# القرار: 2026-05-04 | الأولوية: high | قبل أي زبون حقيقي جديد
#
# الهدف: الزبون يشترك بنفسه → يسجّل معلوماته → يفتح موقعه جاهزاً
#        بالقالب الذي اختاره الـ Agent → يضيف صوره وعناوينه مباشرة.
#
# الفرق عن Plan A (tenant-seeder agent يعمل كل شي):
#   Plan A: Agent يسجّل + يضبط + يرسل للزبون credentials
#   Plan B: Agent يضبط القالب → يرسل للزبون رابط ساين أب →
#           الزبون يسجّل بنفسه → يفتح dashboard جاهز
# ══════════════════════════════════════════════════════════════════════════

  - id: 52
    name: "Self-Service Onboarding Plan B — Sign-up Page + Generic Admin Dashboard"
    status: in_progress
    priority: high
    decision_date: "2026-05-04"
    started_at: "2026-05-04"
    estimated_effort: "أسبوعان"
    blocked_by: []   # unblocked — all prereqs done

    context: |
      الوضع الحالي (2026-05-04 — بعد Session):
        ✅ Backend register → DB → catalog service مزروع تلقائياً
        ✅ /demo/{slug} تعرض القالب والتصنيفات
        ✅ /{slug}/dashboard route موجود (محمي بـ JWT)
        ✅ GenericAdminDashboard.jsx مبني (52.2)
        ✅ CatalogTab.jsx مبني (52.3)
        ✅ SettingsTab.jsx مبني (52.4)
        ✅ App.jsx: /:slug/dashboard → GenericAdminDashboard (52.6)
        ✅ TenantRegisterPage.jsx مبني (52.1)
        ✅ /register route محدّث → TenantRegisterPage عند وجود ?template=
        ❌ useImageUpload.js hook (52.5) — لم يُبنَ بعد
        ❌ Registration one-shot با template_key في الـ endpoint (52.7) — اختياري

    flow_design: |
      1. Agent يستخرج بيانات الزبون من WhatsApp
      2. Agent يختار القالب + اللون من template-registry.js
      3. Agent يولّد رابط ساين أب مخصص:
           https://salmansaas.com/register?template=fashion-grid&color=%23E8E8E8&slug=layla-boutique
      4. يرسل الرابط للزبون عبر WhatsApp
      5. الزبون يفتح الرابط → يرى صفحة ساين أب جاهزة (القالب محدد مسبقاً)
      6. يملأ: اسمه + بريده + كلمة مرور
      7. يضغط "أنشئ متجري" → POST /auth/register
      8. Backend: register → PATCH settings (template+color) → seed categories
         (كل هذا في خطوة واحدة بـ URL params)
      9. Redirect → /{slug}/dashboard (Generic Admin Dashboard)
      10. Dashboard جاهز: يضيف صوره + عناوينه + أسعاره

    tasks:

      - id: 52.1
        name: "صفحة Sign-Up للزبون — /register"
        file: "frontend/src/pages/auth/TenantRegisterPage.jsx"
        status: done
        completed_at: "2026-05-04"
        priority: critical
        details: |
          Route: /register?template=&color=&slug=

          الحقول:
            - business_name_ar    (اسم المتجر)
            - owner_name          (اسم صاحب العمل)
            - email
            - password            (min 8)
            - whatsapp_number

          القالب محدد مسبقاً من URL params (hidden fields).
          يعرض mini-preview للقالب بالجانب (اسم + اللون الرئيسي).

          عند الإرسال:
            POST /api/v1/auth/register
            بعد نجاح التسجيل → تلقائياً:
              POST /auth/users/login (بنفس credentials)
              PATCH /admin/settings (template + color من URL params)
              POST /admin/catalog/seed-from-template (seedCategories من registry)
            Redirect → /{slug}/dashboard?welcome=true

          الـ welcome=true يُظهر onboarding tooltip: "ابدأ بإضافة أول منتج 🎉"

      - id: 52.2
        name: "Generic Admin Dashboard — لكل tenant جديد"
        file: "frontend/src/pages/generic-admin/GenericAdminDashboard.jsx"
        status: done
        completed_at: "2026-05-04"
        priority: critical
        details: |
          Dashboard عام يشتغل مع أي tenant عنده catalog service.
          يحل محل SmarAdminDashboard في route /:slug/dashboard.

          Tabs حسب active_services:
            catalog  → CatalogTab   (التصنيفات + المنتجات)
            settings → SettingsTab  (اسم، لون، شعار، واتساب)
            [future] booking → AppointmentsTab
            [future] store   → OrdersTab

          Header:
            - اسم المتجر + primary_color
            - "نسخة تجريبية — X يوم متبقٍ" إذا status=trial
            - زر "ترقية للاشتراك"

          يقرأ slug من useParams() فقط — لا hardcode.

      - id: 52.3
        name: "CatalogTab — إدارة التصنيفات والمنتجات"
        file: "frontend/src/pages/generic-admin/tabs/CatalogTab.jsx"
        status: done
        completed_at: "2026-05-04"
        priority: critical
        details: |
          القسمان:
          ── التصنيفات:
            - قائمة التصنيفات الموجودة (من seed-from-template)
            - إضافة تصنيف جديد (اسم عربي + إنجليزي + نوع العرض)
            - حذف (soft delete: isActive=false)

          ── المنتجات (داخل كل تصنيف):
            - إضافة منتج:
                name_ar    (اسم المنتج)
                name_en    (اختياري)
                price      (السعر)
                currency   (USD | LBP | ...)
                image_url  (رفع صورة أو رابط)
                description_ar (وصف قصير)
                is_featured    (toggle)
            - تعديل / حذف منتج موجود
            - ترتيب المنتجات بـ drag (sort_order)

          API calls:
            GET    /admin/catalog/categories
            POST   /admin/catalog/categories
            DELETE /admin/catalog/categories/{id}
            GET    /admin/catalog/categories/{id}/items  (admin endpoint)
            POST   /admin/catalog/items
            PATCH  /admin/catalog/items/{id}
            DELETE /admin/catalog/items/{id}

      - id: 52.4
        name: "SettingsTab Generic — اسم + لون + لوغو + واتساب"
        file: "frontend/src/pages/generic-admin/tabs/SettingsTab.jsx"
        status: done
        completed_at: "2026-05-04"
        priority: high
        details: |
          حقول قابلة للتعديل:
            - name_ar, name_en        → PATCH /admin/settings
            - primary_color           → color picker hex → PATCH /admin/settings
            - whatsapp_number         → PATCH /admin/settings
            - logo_url                → رفع صورة لـ Supabase Storage أو رابط مباشر

          لا حقول smar-specific (لا hero_video_url، لا unit_types).

      - id: 52.5
        name: "Image Upload — Supabase Storage للـ catalog items"
        file: "frontend/src/hooks/useImageUpload.js"
        status: planned
        priority: medium
        details: |
          hook عام: useImageUpload(bucket, folder)
          يرفع الصورة إلى: properties/{slug}/catalog/{category_id}/{filename}
          يرجع: public URL

          في CatalogTab:
            <input type="file" accept="image/*" onChange={handleUpload} />
            عند الاختيار → useImageUpload → يُخزَّن الـ URL في form state → PATCH item

      - id: 52.6
        name: "App.jsx — wire route /:slug/dashboard لـ GenericAdminDashboard"
        file: "frontend/src/App.jsx"
        status: done
        completed_at: "2026-05-04"
        priority: critical
        details: |
          تغيير:
            كان:  <SmarAdminDashboard />   (للكل)
            يصير: <GenericAdminDashboard /> (للكل — smar مستثنى via check)

          الـ GenericAdminDashboard يقرأ active_services من /admin/settings
          ويبني الـ tabs ديناميكياً.

          smar يبقى على /smar/admin → SmarAdminDashboard (لا تغيير)

      - id: 52.7
