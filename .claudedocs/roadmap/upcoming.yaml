# قواعد النظام الذري الجديد
# ══════════════════════════════════════════════════════════════════════════════

atomic_architecture_rules:
  slug_resolution:
    rule: "كل كومبونت يقرأ السلوغ من useTenantSlug() مباشرة"
    exception: "Admin preview فقط يمرر slug كـ prop"

  data_fetching:
    rule: "الـ Organisms تجلب بياناتها بنفسها — لا data prop drilling"
    example: "<UnitGrid /> يعمل بدون أي props إضافية"

  no_hardcoding:
    rule: "لا tenant name أو URLs أو phone numbers في JSX مباشرة"
    source: "كل هذا يأتي من useTenantConfig()"

  fm12_react19_safety:
    rule1: "لا MotionValue في style props — فقط animate= و whileHover= و whileTap="
    rule2: "لا useScroll مع target ref — scroll listener في useEffect فقط"

  error_boundaries:
    rule1: "كل Template يُلفّ بـ ErrorBoundary على مستوى الـ route"
    rule2: "كل Organism يُلفّ بـ ErrorBoundary داخلي — خطأ section لا يكسر الصفحة"

  layer_mapping:
    atoms:     "props فقط — لا hooks، لا API، لا state خارجي"
    molecules: "local state فقط — لا API calls"
    organisms: "useTenantSlug + useUnits + useBooking — self-contained"
    templates: "تُرتّب organisms فقط — لا slug، لا data"
    pages:     "= template instance في route — تختفي تدريجياً"


