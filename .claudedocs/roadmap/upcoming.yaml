  # PHASE 39: Gallery Page — /smar/gallery
  # صفحة معرض مستقلة تجلب صورها من Supabase Storage تلقائياً
  # ══════════════════════════════════════════════════════════════════════════

  - id: 39
    name: "Gallery Page — Masonry Grid + Lightbox + Coming Soon Villas"
    status: planned
    priority: high
    description: |
      صفحة /smar/gallery مستقلة — Masonry Grid أنيق لعرض جمال بيت سمار.
      البيانات تُجلب من properties/beitsmar/gallery/ في Supabase Storage (auto-list).
      الفلل تظهر واجهة Coming Soon بدلاً من صور.

    supabase_storage:
      showcase_bucket: "properties/beitsmar/showcase/"   # أصول الـ ShowcaseTemplate
      gallery_bucket:  "properties/beitsmar/gallery/"    # صور المعرض العامة (beitsmar1→12)

    tasks:

      - id: 39.1
        name: "Backend — List Gallery Images from Supabase Storage"
        file: "app/api/v1/public.py"
        status: planned
        details: |
          إضافة endpoint:
            GET /api/v1/public/{slug}/gallery
            يُعيد قائمة الصور من Supabase Storage bucket properties/{slug}/gallery/
            يستخدم supabase-py storage.list() — لا column في DB
            Response: [ { url, filename, category } ]

          Category تُستخرج من اسم الملف:
            beitsmar1-3  → "chalet"
            beitsmar4-6  → "nature"
            beitsmar7-9  → "pool"
            beitsmar10-12 → "chalet"
          (أو تُخزَّن في metadata مع الرفع — أسهل)

          Multi-tenancy: bucket path يحتوي slug — لا تسريب بين tenants

      - id: 39.2
        name: "Gallery Page — React Component"
        file: "src/pages/smar/gallery/SmarGalleryPage.jsx"
        status: planned
        details: |
          Route: /smar/gallery
          يُضاف إلى smar.routes.jsx كـ lazy import.

          Layout:
            1. TenantHeader (sticky, glassmorphism)
            2. Page title "معرض بيت سمار" + subtitle
            3. Filter Tabs: الكل | الشاليهات | المسبح | الطبيعة | الفلل
            4. Masonry Grid (CSS columns: 3 desktop / 2 tablet / 1 mobile)
            5. Footer

          Filter Tabs منطق:
            - الكل / الشاليهات / المسبح / الطبيعة:
                يُرشّح صور gallery/ بالـ category وتُعرض
            - تاب الفلل → Coming Soon State (لا صور):
                واجهة glassmorphism كاملة (backdrop-blur + border ذهبي)
                أيقونة قفل ذهبي (🔒 أو SVG)
                نص: "الفلل الملكية" / "نجهز لكم تجربة استثنائية"
                نص ثانوي: "قريباً جداً..."
                لا صور ولا grid — الواجهة تملأ المساحة بأناقة

      - id: 39.3
        name: "Lightbox — Fullscreen Image Viewer"
        file: "src/pages/smar/gallery/SmarGalleryPage.jsx"
        status: planned
        details: |
          عند الضغط على أي صورة في الـ Masonry Grid:
            - AnimatePresence: overlay يظهر (opacity 0→1)
            - الصورة تتمدد لـ fullscreen (scale + y animation)
            - Glassmorphism toolbar: X للإغلاق + اسم الصورة
            - ← / → للتنقل بين الصور
            - ESC key يغلق
            - Swipe gesture على الموبايل (touchstart/touchend)

          Implementation: state فقط — لا مكتبة خارجية (react-photo-view / lightgallery)
          No external deps: AnimatePresence + motion.div فقط

      - id: 39.4
        name: "Route Registration — /smar/gallery"
        file: "src/router/tenants/smar.routes.jsx"
        status: planned
        details: |
          إضافة lazy import:
            const SmarGalleryPage = lazy(() => import('../../pages/smar/gallery/SmarGalleryPage'));
          إضافة route:
            <Route path="gallery" element={<Lazy component={SmarGalleryPage} />} />
          إضافة رابط Gallery في nav الـ ShowcaseTemplate S6 Finale.

      - id: 39.5
        name: "ShowcaseTemplate — S3 Coming Soon Modal"
        file: "src/templates/ShowcaseTemplate.jsx"
        status: planned
        details: |
          تعديل زر "استكشف الفلل" في S3:
            - لا navigate — يُطلق useState showVillaModal=true
            - AnimatePresence modal (glassmorphism, backdrop-blur):
                قفل ذهبي + "الفلل الملكية" + "قريباً جداً..."
                زر إغلاق X
            - نفس Coming Soon design المستخدم في Gallery tab

    implementation_order:
      - "39.2 + 39.3 أولاً (Gallery Page) — نتيجة بصرية فورية للصور المرفوعة"
