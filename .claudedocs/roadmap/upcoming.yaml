# PHASE 46: Unified Server Merge — 3 Servers → 1 SalmanSaaS Platform
# القرار: 2026-05-02 | الأولوية: high | خطة مفصلة لدمج الـ 3 servers
# ══════════════════════════════════════════════════════════════════════════

  - id: 46
    name: "Unified Server Merge — Booking + Restaurant + Store"
    status: planned
    priority: high
    agent: backend-architect
    estimated_effort: "5-7 أيام"
    description: |
      دمج 3 servers مستقلة في منصة SalmanSaaS موحدة:
        - WhatsApp Booking (smar) — booking module ✅ Live
        - Multi-Cafe-SaaS (caracas) — restaurant module 🔄
        - Multy_Store (footlab) — store module 🔄
      النتيجة: server واحد، DB واحد، 3 modules خلف client_services gate.

    old_servers:
      booking:    "C:\\Users\\Lenovo\\Desktop\\WhatsApp Appointment Booking System\\"
      cafe:       "old servers\\Multi-Cafe-Saas\\"
      store:      "old servers\\Multy_store\\"

    clients:
      - slug: smar
        module: booking
        status: live
        db_migration: none_needed
      - slug: caracas
        module: restaurant
        status: needs_client_record_created
        db_migration: add_clientId_to_restaurant_tables
      - slug: footlab
        module: store
        status: needs_client_record_created
        db_migration: data_already_uses_Client_model

    architecture_decisions:
      tenant_model:    "Client table (slug, type) — unified across all modules"
      service_gate:    "client_services bridge table + require_service() dependency"
      routing:         "/{slug}/config → type detection → module-specific endpoints"
      customer_model:  "unified customers table — phone unique per client (NOT global)"
      security:        "single security.py (bcrypt only, no plain-text fallback, JWT 8h)"
