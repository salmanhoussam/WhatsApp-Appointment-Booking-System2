          يمنع سلمان من رؤية بيانات tenant عند دخول الصفحة بالخطأ.

      - id: 44.2
        name: "TeamTab — تصحيح Role Mismatch"
        file: "frontend/src/pages/smar/admin/components/TeamTab.jsx"
        status: planned
        priority: critical
        details: |
          1. تحديث ROLE_CONFIG:
               TENANT_ADMIN:          { label: 'مدير كامل', labelEn: 'Admin',             color: gold  }
               MANAGER_RESERVATIONS:  { label: 'مدير حجوزات', labelEn: 'Reservations Mgr', color: blue  }
