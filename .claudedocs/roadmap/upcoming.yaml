# PHASE 50: Tenant Onboarding UX — Page Type + Trial Routing
# القرار: 2026-05-03 | الأولوية: high | قبل أي tenant حقيقي جديد
# ══════════════════════════════════════════════════════════════════════════

  - id: 50
    name: "Tenant Onboarding — Page Type Selection + Trial Routing"
    status: planned
    priority: high
    description: |
      عند إنشاء tenant جديد، يختار: صفحة عادية (normal) أم showcase.
      أثناء فترة التجربة: لا subdomain — الروابط تحت auth.salmansaas.com.
      بعد الاشتراك الحقيقي: يُعطى subdomain slug.salmansaas.com.

    routing_design:
      trial_public:  "auth.salmansaas.com/demo/{slug}"
      trial_admin:   "auth.salmansaas.com/{slug}/dashboard"
      trial_tabs:    "units | site-build | bookings | settings"
      production_public: "{slug}.salmansaas.com"
      production_admin:  "{slug}.salmansaas.com/admin"

    page_type_field:
      model: "Client"
      field: "pageType  String  @default('normal')"
      values:
        normal:   "صفحة عادية — CatalogPage / MenuPage / StorePage"
        showcase: "صفحة عرض سينمائية — ShowcaseTemplate (GSAP + Framer Motion)"

    tasks:

      - id: 50.1
        name: "Schema — إضافة pageType على Client"
        file: "prisma/schema.prisma"
        status: planned
        details: |
          إضافة: pageType  String  @default("normal") @map("page_type")
          القيم: "normal" | "showcase"
          يُقرأ من /config endpoint → frontend يختار المسار

      - id: 50.2
        name: "Trial Routing — auth.salmansaas.com/demo/{slug}"
        status: planned
        details: |
          App.jsx: إضافة route جديد:
            <Route path="/demo/:slug/*" element={<TrialTenantResolver />} />

          TrialTenantResolver:
            يقرأ slug من params
            يجلب config: GET /api/v1/public/{slug}/config
            إذا pageType === 'showcase' → يرندر ShowcaseTemplate
            إذا pageType === 'normal'   → يرندر حسب service_type:
              restaurant → MenuPage
              store      → StorePage
              services   → CatalogPage

          يستخدم مكونات موجودة — لا تكرار

      - id: 50.3
        name: "Trial Admin Routing — auth.salmansaas.com/{slug}/dashboard"
        status: planned
        details: |
          Route: <Route path="/:slug/dashboard/*" element={<TrialAdminDashboard />} />

          TrialAdminDashboard:
            نفس SmarAdminDashboard لكن بـ:
              - Header يعرض "🧪 نسخة تجريبية" بدل الـ logo
              - Tab extra: "site-build" → Site Builder UI
              - Tab: "upgrade" → ترقية للاشتراك

          Tabs حسب service_type:
            real_estate: units | bookings | gallery | settings
            restaurant:  menu | orders | settings
            store:       products | orders | settings
            services:    catalog | bookings | settings

      - id: 50.4
        name: "Showcase Background — ConfigurableHero"
        status: planned
        details: |
          مكوّن جديد: frontend/src/components/ConfigurableHero.jsx
          يستقبل:
            page_type:    "normal" | "showcase"
            template_key: "beauty-salon-women" | "store-fashion-grid" | ...
            primary_color: "#e91e8c"
            content:      { hero_title_ar, hero_subtitle_ar, cover_url }

          إذا page_type === 'showcase':
            يرندر ShowcaseHero (GSAP split-image أو full-bleed-video)
          إذا page_type === 'normal':
            يرندر SimpleHero (GlassCard + title + CTA)

          يُستخدم في TrialTenantResolver + production pages

      - id: 50.5
        name: "SSOLoginPage — redirect لـ Trial Admin بعد login"
        file: "frontend/src/pages/auth/SSOLoginPage.jsx"
        status: planned
        details: |
          resolveRedirect() حالياً يرسل لـ slug.salmansaas.com/admin
          التعديل:
            if (client.status === 'trial' || client.status === 'demo') {
              → redirect: auth.salmansaas.com/{slug}/dashboard
            } else {
              → redirect: {slug}.salmansaas.com/admin (كالحال)
            }

      - id: 50.6
        name: "Super Admin — تحديد page_type عند إنشاء tenant"
        file: "frontend/src/pages/super-admin/ClientsManager.jsx"
        status: planned
        details: |
          إضافة radio في "Add Client" form:
            ○ صفحة عادية (normal)
            ○ صفحة عرض (showcase)
          يُرسَل في PATCH /api/v1/super/clients/{id}/settings

    implementation_order:
      - "50.1 → Schema (5 min)"
      - "50.2 → Trial public routing (45 min)"
      - "50.4 → ConfigurableHero (30 min)"
      - "50.3 → Trial Admin dashboard (60 min)"
      - "50.5 → SSO redirect fix (15 min)"
      - "50.6 → Super Admin form (20 min)"

# ══════════════════════════════════════════════════════════════════════════
# PHASE 51: Infinite Sites — AI-Powered Tenant Scaffolding
# القرار: 2026-05-03 | الأولوية: future | بعد اكتمال DB + Schema
# المرجع الكامل: .claudedocs/design/infinite-sites-ai-scaffolding.md
# ══════════════════════════════════════════════════════════════════════════

  - id: 51
    name: "Infinite Sites — AI Scaffolding via n8n + Claude Agent"
    status: future
    priority: high
    blocked_by:
      - "Phase 49 — Display Templates (يجب أن يعمل قبل الـ scaffolding)"
      - "Phase 50 — Trial Routing (يجب أن يكون جاهزاً)"
      - "Phase 50.4 — ConfigurableHero (الـ agent يحتاجه)"
    description: |
      نظام يولّد tenant كاملاً (DB + dashboard + صفحة عرض) من JSON واحد.
      الـ JSON يُنتَج من محادثة WhatsApp عبر n8n → يُرسَل لـ Claude Agent.
      الـ Agent ينفذ الـ 8 خطوات (create client, seed services, seed categories...).
      النتيجة: الزبون يُرسَل له رابط dashboard جاهز ليبدأ إضافة محتواه.

    template_library:
      total: 20
      categories:
        fashion:    4  # store-fashion-grid, store-fashion-editorial, store-shoes, store-accessories
        food:       4  # food-restaurant, food-cafe, food-fastfood, food-bakery
        beauty:     4  # beauty-salon-women, beauty-barber, beauty-nails, beauty-spa
        health:     4  # health-clinic, health-dental, health-gym, health-pharmacy
        services:   4  # service-mechanic, service-education, service-photography, service-general

    json_payload_keys:
      required:
        - client.slug
        - client.owner_phone
        - admin_account.email
        - design.primary_color
        - design.template_key
        - services_config.active_services
      optional:
        - client.name_ar / name_en
        - design.hero_style
        - services_config.catalog.seed_categories
        - services_config.store_config (has_sizes, filter_types...)
        - content.hero_title_ar

    agent_steps:
      1: "POST /public/register → client_id + slug"
      2: "PATCH /super/clients/{id}/settings → color, template, config"
      3: "PATCH /super/clients/{id}/services × N → activate each service"
      4: "POST /super/clients/{id}/seed-categories → bulk catalog categories"
      5: "[if store] POST /super/clients/{id}/store-config"
      6: "[if restaurant] POST /super/clients/{id}/restaurant-config"
      7: "PATCH /admin/settings → hero content, whatsapp greeting"
      8: "POST notify → WhatsApp + email للزبون بالرابط + كلمة المرور"

    n8n_nodes:
      - "WhatsApp Webhook"
      - "LLM Extractor (Claude) — يستخرج client info من المحادثة"
      - "JSON Validator — يتحقق من الحقول الإلزامية"
      - "Template Matcher — يختار template_key + default colors"
      - "AI Scaffolding Agent (Claude opus-4-7 + HTTP tools)"
      - "Notification Node — WhatsApp + email"
      - "Google Sheet Update — يضيف الزبون للـ CRM"

    prerequisites_backend:
      - "POST /api/v1/super/clients/{id}/seed-categories (bulk)"
      - "PATCH /api/v1/super/clients/{id}/settings"
      - "frontend/src/config/template-registry.js (20 templates)"

    design_doc: ".claudedocs/design/infinite-sites-ai-scaffolding.md"
    estimated_effort: "3-5 أيام (بعد Phase 49 + 50)"

