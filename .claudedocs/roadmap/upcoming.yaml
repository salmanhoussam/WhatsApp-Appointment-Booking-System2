    tasks:

      # ── PHASE 46.1: Schema Additions ─────────────────────────────────────

      - id: 46.1
        name: "Add ClientService model to prisma/schema.prisma"
        file: "prisma/schema.prisma"
        status: done
        completed_at: "2026-05-02"
        priority: critical
        details: |
          إضافة model ClientService:
            id          String   @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            clientId    String   @db.Uuid
            serviceKey  String   // "booking" | "gallery" | "restaurant" | "store" | ...
            isActive    Boolean  @default(true)
            activatedAt DateTime @default(now())
            config      Json?
            client      Client   @relation(fields: [clientId], references: [id])
            @@unique([clientId, serviceKey])
            @@map("client_services")

          إضافة relation في Client model:
            services ClientService[]

          بعد الإضافة: npx prisma db push (DIRECT_URL port 5432)

      - id: 46.2
        name: "Fix Customer.phone — unique per client (not global)"
        file: "prisma/schema.prisma"
        status: done
        completed_at: "2026-05-02"
        priority: critical
        details: |
          المشكلة الحالية:
            phone String @unique  ← global unique — يمنع نفس الزبون من التسجيل في tenants مختلفة

          الحل:
            phone    String
            clientId String
            @@unique([clientId, phone])  ← unique per tenant فقط

          يتطلب migration: DROP old unique constraint + ADD new composite unique

      - id: 46.3
        name: "Add Restaurant Module models to schema"
        file: "prisma/schema.prisma"
        status: done
        completed_at: "2026-05-02"
        priority: high
        details: |
          نقل من old servers/Multi-Cafe-Saas/prisma/schema.prisma مع تعديلات:

          model Restaurant {
            id           String  @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            clientId     String  @db.Uuid    ← إضافة جديدة للربط بـ Client
            name         String
            nameAr       String?
            description  String?
            logoUrl      String?
            workingHours Json?
            isActive     Boolean @default(true)
            client       Client  @relation(fields: [clientId], references: [id])
            categories   MenuCategory[]
            orders       RestaurantOrder[]
            @@map("restaurants")
          }

          model MenuCategory {
            id           String @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            restaurantId String @db.Uuid
            nameAr       String
            nameEn       String?
            imageUrl     String?
            position     Int    @default(0)
            isActive     Boolean @default(true)
            restaurant   Restaurant @relation(fields: [restaurantId], references: [id])
            items        MenuItem[]
            @@map("menu_categories")
          }

          model MenuItem {
            id           String @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            categoryId   String @db.Uuid
            nameAr       String
            nameEn       String?
            description  String?
            price        Float
            imageUrl     String?
            isAvailable  Boolean @default(true)
            position     Int     @default(0)
            category     MenuCategory @relation(fields: [categoryId], references: [id])
            orderItems   RestaurantOrderItem[]
            @@map("menu_items")
          }

          model RestaurantOrder {
            id           String @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            restaurantId String @db.Uuid
            customerName String
            customerPhone String
            tableNumber  String?
            status       String @default("pending") // pending|preparing|ready|delivered|cancelled
            totalAmount  Float
            notes        String?
            createdAt    DateTime @default(now())
            restaurant   Restaurant @relation(fields: [restaurantId], references: [id])
            items        RestaurantOrderItem[]
            @@map("restaurant_orders")
          }

          model RestaurantOrderItem {
            id         String @id @default(dbgenerated("gen_random_uuid()")) @db.Uuid
            orderId    String @db.Uuid
            menuItemId String @db.Uuid
            quantity   Int
            unitPrice  Float
            notes      String?
            order      RestaurantOrder @relation(fields: [orderId], references: [id])
            menuItem   MenuItem @relation(fields: [menuItemId], references: [id])
            @@map("restaurant_order_items")
