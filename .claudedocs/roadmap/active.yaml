  # ── IN PROGRESS: Phase 30 — ShowcaseTemplate Z-Axis ─────────────────

  - id: 30
    name: "Phase 30 — Cinematic Z-Axis Showcase"
    status: in_progress
    description: |
      تحويل صفحة Showcase من KineticSection (Framer Motion) إلى
      تجربة سينمائية بـ GSAP ScrollTrigger + CSS perspective Z-axis.
      مستوحاة من نمط FootlabAboutPage.jsx (6 محطات pinned).

    tasks:

      - id: 30.1
        name: "Build ShowcaseTemplate — GSAP Z-Axis 6 Stations"
        file: "src/templates/ShowcaseTemplate.jsx"
        status: done
        completed: 2026-04-17
        details: |
          Architecture:
            - Single pinned stage (100vh) — perspective: 1400px
            - 6 stations (position: absolute, transform-style: preserve-3d)
            - gsap.context() scoped to stageRef → ctx.revert() on unmount
            - gsap.matchMedia() — separate values for desktop / mobile
            - invalidateOnRefresh: true

          Stations:
            S1 — Hero Video     : starts visible, exits Z (scale up + blur)
                                  اللوجو يركب داخل الإطار الحجري (video autoPlay muted loop)
            S2 — Forest Journey : Z-enter + image zoom 1→1.7 + whisper "خطوات نحو الهدوء"
            S3 — Villa (القنطرة الحجرية):
                                  Z-enter + glass panel slides from RIGHT (x: 88px→0)
                                  ⚠️  CTA "استكشف الفلل" → Coming Soon Glass Modal
                                  (الفلل غير جاهزة — لا navigate — modal بذهبي + قفل)
            S4 — Chalet         : X-slide entry (28vw→0) + glass panel from LEFT
                                  CTA يعمل → navigate(`/${slug}/listings?type=chalet`)
            S5 — Pool & Cocktail: blur reveal (scale 1.14→1) + glass panel fades up
                                  صور المسبح والمشروبات (beitsmar11 + beitsmar12)
            S6 — Sunset Finale  : deep Z-enter (z:-4400) + CTA + links reveal
                                  تراس بيت سمار + غروب + رابط الخريطة + footer

          Ambient effects (deterministic — no Math.random):
            - 28 dust motes: float upward, CSS @keyframes, --op custom property
            - 16 fireflies: gold pulse, CSS @keyframes
            - 7 depth rings: expand via depthRef scale 1→3.8 throughout journey

          Immersive nav:
            - position: fixed, z-index: 200, fully transparent background
            - Logo "بيت سمار" + 3 nav buttons (ultra-low opacity)
            - No TenantHeader — immersive, no black bar

          Scroll end: +=600% desktop / +=440% mobile
          scrub: 1.4  (same as Footlab reference)

          CSS approach:
            - All styles in STYLES const (inline <style> tag) — zero global pollution
            - All class names prefixed sc- to avoid conflicts
            - sc-glass-b uses margin:0 auto (not transform:translateX(-50%))
              → GSAP y-animation is safe (no CSS transform conflict)

        route_change:
          file: "src/router/tenants/smar.routes.jsx"
          change: "ShowcaseTemplate converted from direct import → lazy()
                   because gsap.registerPlugin(ScrollTrigger) runs at module scope"

